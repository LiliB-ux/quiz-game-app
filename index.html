<!DOCTYPE html>
<html>
<head>
  <title>Quiz Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Tech Quiz</h1>

  <div id="quiz-container">
    <p id="progress">Question 1 of 5</p>
    <p id="score">Score: 0</p>
    <p id="question"></p>

    <div id="answers">
      <button onclick="checkAnswer(0)"></button>
      <button onclick="checkAnswer(1)"></button>
      <button onclick="checkAnswer(2)"></button>
      <button onclick="checkAnswer(3)"></button>
    </div>

    <p id="result"></p>
    <button id="next-btn" onclick="nextQuestion()" style="display: none;">Next Question</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
